<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1440, initial-scale=1"/>
<title>Бизнес с Контуром — Экосистема</title>
<link rel="stylesheet" href="styles.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Manrope', sans-serif; }
  body { min-width: 1480px; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 60px 20px 40px; box-sizing: border-box; }
  .frame-wrap {
    position: relative;
    width: 1440px;
    height: 900px;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08), 0 12px 40px rgba(0,0,0,0.08);
    overflow: hidden;
    background: #fff;
    flex-shrink: 0;
  }
  .label {
    position: absolute; bottom: 100%; left: 0; padding-bottom: 10px;
    font-size: 13px; font-weight: 600; color: rgba(60,50,40,0.7);
    white-space: nowrap; font-family: 'Manrope', sans-serif;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="frame.jsx"></script>
<script type="text/babel" src="desktop/Desktop.jsx"></script>
<script type="text/babel" src="desktop/DesktopOthers.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const Comp = window.DesktopKontur;
  return (
    <div className="frame-wrap">
      <div className="label">3 · Экосистема Контура · 7 сервисов + синергии</div>
      <Comp/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
